<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Android UI 自动化控制台</title>
  <style>
    body {
      margin: 0;
      font-family: "Microsoft YaHei", sans-serif;
      background: #f5f6f8;
      color: #1f2933;
    }
    main {
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 20px;
      font-size: 24px;
    }
    section {
      background: #fff;
      border: 1px solid #d8dee6;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 16px;
    }
    button {
      font-family: "Microsoft YaHei", sans-serif;
      min-width: 84px;
      height: 36px;
      margin-right: 8px;
      border: 1px solid #b8c2cc;
      border-radius: 4px;
      background: #fff;
      color: #1f2933;
      cursor: pointer;
    }
    button:hover:not(:disabled) {
      filter: brightness(0.96);
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }
    button.success {
      background: #0f766e;
      color: #fff;
      border-color: #0f766e;
    }
    button.danger {
      background: #b91c1c;
      color: #fff;
      border-color: #b91c1c;
    }
    button.warning {
      background: #d97706;
      color: #fff;
      border-color: #d97706;
    }
    button.info {
      background: #1d4ed8;
      color: #fff;
      border-color: #1d4ed8;
    }
    button.service {
      background: #374151;
      color: #fff;
      border-color: #374151;
    }
    button.energy {
      background: #7c3aed;
      color: #fff;
      border-color: #7c3aed;
    }
    button.coin-outline {
      background: #fff;
      color: #92400e;
      border-color: #d97706;
      border-width: 2px;
    }
    button.energy-outline {
      background: #fff;
      color: #6d28d9;
      border-color: #7c3aed;
      border-width: 2px;
    }
    button.active {
      background: #e0f2fe;
      border-color: #0284c7;
      color: #075985;
    }
    input,
    select {
      font-family: "Microsoft YaHei", sans-serif;
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid #b8c2cc;
      border-radius: 4px;
      font-size: 14px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .toolbar-spacer {
      flex: 1;
    }
    .user-select {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #52616f;
      font-size: 13px;
      white-space: nowrap;
    }
    input.coin-input,
    .tag-editor.coin {
      border-color: #d97706;
      border-width: 2px;
    }
    input.energy-input,
    .tag-editor.energy {
      border-color: #7c3aed;
      border-width: 2px;
    }
    .exclude-grid {
      display: grid;
      grid-template-columns: 110px minmax(260px, 1fr) auto;
      gap: 10px;
      align-items: center;
      max-width: 920px;
    }
    .coin-label {
      color: #92400e;
      font-weight: 600;
    }
    .energy-label {
      color: #6d28d9;
      font-weight: 600;
    }
    .rules-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .rule-row {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
      padding: 12px 0;
      border-top: 1px solid #e5e7eb;
    }
    .rule-name {
      margin-bottom: 6px;
      color: #52616f;
      font-size: 13px;
      font-weight: 600;
    }
    .rule-help {
      color: #7b8794;
      font-size: 12px;
      line-height: 1.35;
    }
    .rule-input {
      width: 100%;
      box-sizing: border-box;
    }
    .tag-editor {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
      min-height: 38px;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #b8c2cc;
      border-radius: 4px;
      background: #fff;
    }
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 34px;
      align-items: center;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      max-width: 100%;
      padding: 4px 7px;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      background: #f8fafc;
      color: #1f2933;
      font-size: 13px;
      line-height: 1.2;
      word-break: break-word;
    }
    .tag-editor.coin .tag {
      border-color: #f59e0b;
      background: #fffbeb;
      color: #92400e;
    }
    .tag-editor.energy .tag {
      border-color: #a78bfa;
      background: #f5f3ff;
      color: #6d28d9;
    }
    .tag-remove {
      min-width: 20px;
      width: 20px;
      height: 20px;
      margin: 0;
      padding: 0;
      border-radius: 999px;
      border-color: transparent;
      background: transparent;
      color: inherit;
      line-height: 18px;
    }
    .tag-add {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) auto;
      gap: 6px;
      min-width: 260px;
    }
    .tag-add button {
      min-width: 58px;
      margin-right: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 10px 14px;
    }
    .label {
      color: #52616f;
    }
    #logs {
      margin: 0;
      max-height: 420px;
      overflow: auto;
      font-size: 13px;
      line-height: 1.45;
      background: #111827;
      color: #e5e7eb;
      padding: 12px;
      border-radius: 4px;
      user-select: text;
      cursor: text;
    }
    .log-line {
      white-space: pre-wrap;
      word-break: break-word;
      user-select: text;
    }
  </style>
</head>
<body>
  <main>
    <h1>Android UI 自动化控制台</h1>

    <section class="toolbar">
      <div class="toolbar-actions">
        <button id="start_btn" class="success" onclick="post('/api/start')">启动</button>
        <button id="stop_btn" class="danger" onclick="post('/api/stop')">停止</button>
        <button id="pause_btn" class="warning" onclick="post('/api/pause')">暂停</button>
        <button id="resume_btn" class="info" onclick="post('/api/resume')">继续</button>
        <button id="energy_btn" class="energy" onclick="post('/api/start-energy')">做体力</button>
        <button id="restart_service_btn" class="service" onclick="restartService()">启动/重启服务</button>
      </div>
      <div class="toolbar-spacer"></div>
      <label class="user-select">
        淘宝用户
        <select id="android_user_select" onchange="saveAndroidUser()">
          <option value="0">主淘宝 user 0</option>
          <option value="999">分身淘宝 user 999</option>
        </select>
      </label>
    </section>

    <section>
      <div class="grid">
        <div class="label">当前运行状态</div><div id="running">-</div>
        <div class="label">当前版本号</div><div id="version">-</div>
        <div class="label">淘宝用户</div><div id="android_user_id">-</div>
        <div class="label">当前 Activity</div><div id="activity">-</div>
        <div class="label">当前页面类型</div><div id="page_type">-</div>
        <div class="label">当前操作</div><div id="action">-</div>
        <div class="label">当前任务</div><div id="current_task">-</div>
        <div class="label">排除任务标签</div><div id="exclude_tags">-</div>
        <div class="label">最后错误</div><div id="last_error">-</div>
        <div class="label">更新时间</div><div id="updated_at">-</div>
      </div>
    </section>

    <section>
      <h2>最近日志</h2>
      <button id="detail_log_btn" class="active" onclick="setLogMode('detail')">详细日志</button>
      <button id="key_log_btn" onclick="setLogMode('key')">关键日志</button>
      <button onclick="clearLogs()">清除日志</button>
      <button id="auto_scroll_btn" class="active" onclick="toggleAutoScroll()">自动滚动：开</button>
      <div id="logs"></div>
    </section>

    <section>
      <h2>排除任务标签</h2>
      <div class="exclude-grid">
        <div class="coin-label">金币任务</div>
        <div id="coin_exclude_editor" class="tag-editor coin"></div>
        <button class="coin-outline" onclick="saveExcludeTags('coin')">保存金币</button>
        <div class="energy-label">体力任务</div>
        <div id="energy_exclude_editor" class="tag-editor energy"></div>
        <button class="energy-outline" onclick="saveExcludeTags('energy')">保存体力</button>
      </div>
    </section>

    <section>
      <h2>文字匹配规则</h2>
      <button onclick="saveRules()">保存规则</button>
      <button onclick="loadRules()">重新加载</button>
      <div id="rules" class="rules-list"></div>
    </section>
  </main>

  <script>
    const runningLabels = {
      running: '运行中',
      paused: '已暂停',
      stopped: '已停止'
    };

    const pageTypeLabels = {
      unknown: '未知页面',
      unknown_taobao_page: '淘宝其他页面',
      external_app: '任务页 - 三方应用',
      coin_home: '淘金币首页',
      daily_task_list: '淘金币任务列表页',
      energy_task_list: '做任务赚体力列表页',
      taobao_browse_task: '任务页 - 滑动浏览',
      quiz: '任务页 - 答题',
      task_done: '任务完成页'
    };

    const actionLabels = {
      idle: '空闲',
      starting: '启动中',
      finding_entry: '寻找淘金币入口',
      switching_daily: '切换日常版',
      finding_task: '寻找任务',
      scrolling_task_list: '翻页寻找任务',
      clicking_task: '点击任务',
      doing_scroll_task: '模拟任务滚动',
      doing_jump_energy: '执行跳一跳拿体力',
      doing_quiz_task: '执行答题任务',
      doing_search_task: '执行搜索任务',
      returning_to_task_list: '回到任务列表页中',
      paused: '已暂停',
      stopping: '正在结束',
      error: '错误'
    };

    const ruleMeta = {
      action_text_pattern: ['动作按钮正则', 'pattern', '用于匹配“去完成/去逛逛”等按钮文本；正则命中后作为可点击任务按钮。'],
      skip_task_extra_words: ['排除任务扩展词', 'list', '更长的跳过词库；任务名包含任一词就跳过。'],
      done_words: ['已完成任务词', 'list', '用于判断任务行/任务名是否已经完成；命中后不再点击该任务。'],
      search_browse_words: ['搜索浏览页词', 'list', '页面文本包含任一词时，认为是搜索浏览奖励页。'],
      coin_home_words: ['淘金币首页词', 'list', '页面包含这些词且没有任务区词时，判定为淘金币首页。'],
      coin_home_task_words: ['首页任务区词', 'list', '用于区分淘金币首页和任务列表/任务区。'],
      browse_page_words: ['浏览任务页词', 'list', '页面包含任一词时，判定为滑动浏览任务页。'],
      daily_fast_words: ['日常快速赚词', 'list', '识别今日速赚区域；命中时优先尝试展开更多任务。'],
      daily_task_area_words: ['日常任务区词', 'list', 'XML 页面包含这些词时，辅助判定为日常任务列表。'],
      task_list_words: ['任务列表页词', 'list', '页面包含任一词时，判定为淘金币任务列表页。'],
      task_list_bottom_words: ['任务列表底部词', 'list', '页面包含这些词时，认为任务列表已经到底；找不到任务时结束本轮，不再继续下翻。'],
      task_done_page_words: ['任务完成页词', 'list', '页面文本包含任一词时认为任务完成，但会先排除下面的排除项。'],
      task_done_exclude_words: ['完成词排除项', 'list', '如果同一文本包含这些词，即使含“已得”也不算完成，例如“累计已得”。'],
      quiz_words: ['答题页词', 'list', '页面包含任一词时，判定为趣味课堂答题页。'],
      shop_subscribe_words: ['店铺订阅阳性词', 'list', '页面包含这些词时，才判定仍在店铺订阅任务；“进店”不应放这里。'],
      shop_subscribe_action_pairs: ['店铺订阅动作配对', 'list', '一行一个“按钮正则=>日志名”；命中后点击，例如“进店.*=>进店”。'],
      daily_version_words: ['回日常版词', 'list', '匹配回日常版入口；命中后点击并等待赚更多金币。'],
      earn_more_words: ['赚更多金币词', 'list', '匹配进入任务列表的“赚更多金币”入口。'],
      earn_words: ['赚金币词', 'list', '兜底匹配“赚金币”入口。'],
      expand_words: ['展开词', 'list', '匹配更多任务展开入口；会优先点击可点击父节点。'],
      reward_button_pattern: ['奖励按钮正则', 'pattern', '匹配“领取奖励/立即领取/点击得”等奖励按钮；正则命中后点击领取。'],
      ocr_done_text: ['OCR完成文字', 'text', '浏览任务中每 5 秒 OCR 查找该文字；命中后提前返回。'],
      ocr_done_extra_words: ['OCR辅助完成文字', 'list', '同样每 5 秒 OCR 查找；用于完成浮层里的辅助提示。']
    };

    async function post(url) {
      await fetch(url, { method: 'POST' });
      await refresh();
    }

    async function saveAndroidUser() {
      const select = document.getElementById('android_user_select');
      const response = await fetch('/api/control', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ android_user_id: select.value })
      });
      if (!response.ok) {
        document.getElementById('last_error').textContent = '淘宝用户保存失败，请先重启GUI服务';
        return;
      }
      const result = await response.json();
      if (!result.ok) {
        document.getElementById('last_error').textContent = result.error || '淘宝用户保存失败';
        return;
      }
      await refresh();
    }

    async function restartService() {
      document.getElementById('restart_service_btn').disabled = true;
      sessionStorage.setItem('skip_auto_start_once', '1');
      try {
        await fetch('/api/service/restart', { method: 'POST' });
      } catch (err) {
        document.getElementById('running').textContent = '服务未运行，请先双击淘金币启动.bat';
        document.getElementById('restart_service_btn').disabled = false;
        return;
      }
      document.getElementById('running').textContent = '服务重启中';
      waitForServiceAndReload();
    }

    async function waitForServiceAndReload() {
      const deadline = Date.now() + 15000;
      while (Date.now() < deadline) {
        await new Promise(resolve => setTimeout(resolve, 1000));
        try {
          const response = await fetch(`/api/status?t=${Date.now()}`, { cache: 'no-store' });
          if (response.ok) {
            window.location.reload();
            return;
          }
        } catch (err) {
          // Service is expected to be briefly unavailable during restart.
        }
      }
      document.getElementById('running').textContent = '服务重启中，请手动刷新';
    }

    async function autoStartOnLoad() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('no_auto_start') === '1') {
        sessionStorage.removeItem('skip_auto_start_once');
        return;
      }
      if (sessionStorage.getItem('skip_auto_start_once') === '1') {
        sessionStorage.removeItem('skip_auto_start_once');
        return;
      }
      await post('/api/start');
    }

    function normalizeTags(value) {
      if (Array.isArray(value)) {
        return value.map(v => String(v).trim()).filter(Boolean);
      }
      return String(value ?? '').split(/\n|,|，/).map(v => v.trim()).filter(Boolean);
    }

    function tagEditorIsActive(editor) {
      return editor && editor.contains(document.activeElement);
    }

    function tagEditorIsDirty(editor) {
      return editor && editor.dataset.dirty === '1';
    }

    function markTagEditorDirty(editor) {
      if (editor) editor.dataset.dirty = '1';
    }

    function getTagEditorValues(editorOrId) {
      const editor = typeof editorOrId === 'string' ? document.getElementById(editorOrId) : editorOrId;
      if (!editor) return [];
      return Array.from(editor.querySelectorAll('.tag')).map(tag => tag.dataset.value).filter(Boolean);
    }

    function addTagToEditor(editor, value) {
      const clean = String(value ?? '').trim();
      if (!clean) return;
      const current = new Set(getTagEditorValues(editor));
      if (current.has(clean)) return;
      markTagEditorDirty(editor);
      renderTagEditor(editor, [...current, clean]);
    }

    function renderTagEditor(editor, values, options = {}) {
      const items = normalizeTags(values);
      const inputValue = options.keepInput ? (editor.querySelector('.tag-input')?.value || '') : '';
      const list = document.createElement('div');
      list.className = 'tag-list';
      items.forEach(value => {
        const tag = document.createElement('span');
        const remove = document.createElement('button');
        tag.className = 'tag';
        tag.dataset.value = value;
        tag.append(document.createTextNode(value));
        remove.className = 'tag-remove';
        remove.type = 'button';
        remove.textContent = 'X';
        remove.title = `删除 ${value}`;
        remove.addEventListener('click', () => {
          markTagEditorDirty(editor);
          renderTagEditor(editor, getTagEditorValues(editor).filter(item => item !== value), { keepInput: true });
        });
        tag.append(remove);
        list.append(tag);
      });

      const add = document.createElement('div');
      const input = document.createElement('input');
      const button = document.createElement('button');
      add.className = 'tag-add';
      input.className = 'tag-input';
      input.type = 'text';
      input.value = inputValue;
      input.placeholder = '新增一项';
      button.type = 'button';
      button.textContent = '添加';
      button.addEventListener('click', () => {
        addTagToEditor(editor, input.value);
      });
      input.addEventListener('keydown', event => {
        if (event.key === 'Enter') {
          event.preventDefault();
          addTagToEditor(editor, input.value);
        }
      });
      add.append(input, button);
      editor.replaceChildren(list, add);
    }

    function renderExcludeEditor(kind, values) {
      const editor = document.getElementById(kind === 'energy' ? 'energy_exclude_editor' : 'coin_exclude_editor');
      if (!tagEditorIsActive(editor) && !tagEditorIsDirty(editor)) {
        renderTagEditor(editor, values);
      }
    }

    async function saveExcludeTags(kind) {
      const isEnergy = kind === 'energy';
      const field = isEnergy ? 'energy_exclude_tags' : 'coin_exclude_tags';
      const editorId = isEnergy ? 'energy_exclude_editor' : 'coin_exclude_editor';
      const value = getTagEditorValues(editorId);
      const response = await fetch('/api/exclude-tags', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ [field]: value })
      }).then(r => r.json());
      const editor = document.getElementById(editorId);
      editor.dataset.dirty = '0';
      renderTagEditor(editor, response[field] || value);
      await refresh();
    }

    async function clearLogs() {
      await fetch(`/api/logs/clear?mode=${logMode}`, { method: 'POST' });
      lastLogText = '';
      document.getElementById('logs').replaceChildren();
      await refresh();
    }

    function ruleValueToText(value) {
      return Array.isArray(value) ? value.join('\n') : String(value ?? '');
    }

    function textToRuleValue(textValue, type) {
      if (type === 'list') {
        return textValue.split(/\n|,|，/).map(v => v.trim()).filter(Boolean);
      }
      return textValue.trim();
    }

    async function loadRules() {
      const stamp = Date.now();
      const rules = await fetch(`/api/rules?t=${stamp}`, { cache: 'no-store' }).then(r => r.json());
      const container = document.getElementById('rules');
      container.replaceChildren(...Object.entries(ruleMeta).map(([key, meta]) => {
        const wrap = document.createElement('div');
        const info = document.createElement('div');
        const control = document.createElement('div');
        const label = document.createElement('div');
        const help = document.createElement('div');
        wrap.className = 'rule-row';
        info.className = 'rule-info';
        control.className = 'rule-control';
        label.className = 'rule-name';
        label.textContent = `${meta[0]} (${key})`;
        help.className = 'rule-help';
        help.textContent = meta[2];
        info.append(label, help);
        if (meta[1] === 'list') {
          const editor = document.createElement('div');
          editor.id = `rule_${key}`;
          editor.className = 'tag-editor';
          editor.dataset.ruleKey = key;
          editor.dataset.ruleType = meta[1];
          renderTagEditor(editor, rules[key]);
          control.append(editor);
        } else {
          const input = document.createElement('input');
          input.className = 'rule-input';
          input.dataset.ruleKey = key;
          input.dataset.ruleType = meta[1];
          input.value = ruleValueToText(rules[key]);
          control.append(input);
        }
        wrap.append(info, control);
        return wrap;
      }));
    }

    async function saveRules() {
      const payload = {};
      document.querySelectorAll('[data-rule-key]').forEach(control => {
        if (control.classList.contains('tag-editor')) {
          payload[control.dataset.ruleKey] = getTagEditorValues(control);
          return;
        }
        payload[control.dataset.ruleKey] = textToRuleValue(control.value, control.dataset.ruleType);
      });
      await fetch('/api/rules', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      await loadRules();
      await refresh();
    }

    function text(value) {
      if (value === null || value === undefined || value === '') return '-';
      return String(value);
    }

    function label(map, value) {
      return map[value] || text(value);
    }

    let lastLogText = '';
    let logMode = 'detail';
    let selectingLogs = false;
    let autoScrollLogs = true;
    let lastBottomAt = 0;
    const logsElement = document.getElementById('logs');
    logsElement.addEventListener('pointerdown', () => { selectingLogs = true; });
    document.addEventListener('pointerup', () => { selectingLogs = false; });
    logsElement.addEventListener('scroll', () => {
      const distanceToBottom = logsElement.scrollHeight - logsElement.scrollTop - logsElement.clientHeight;
      if (distanceToBottom > 20) {
        setAutoScroll(false);
        return;
      }
      lastBottomAt = Date.now();
      setAutoScroll(true);
    });

    function setLogMode(mode) {
      logMode = mode;
      lastLogText = '';
      document.getElementById('logs').replaceChildren();
      document.getElementById('detail_log_btn').classList.toggle('active', mode === 'detail');
      document.getElementById('key_log_btn').classList.toggle('active', mode === 'key');
      refresh();
    }

    function setAutoScroll(enabled) {
      autoScrollLogs = enabled;
      const btn = document.getElementById('auto_scroll_btn');
      btn.textContent = `自动滚动：${enabled ? '开' : '关'}`;
      btn.classList.toggle('active', enabled);
    }

    function toggleAutoScroll() {
      setAutoScroll(!autoScrollLogs);
      if (autoScrollLogs) {
        logsElement.scrollTop = logsElement.scrollHeight;
      }
    }

    function isSelectingText() {
      const selection = window.getSelection();
      return selectingLogs || (selection && !selection.isCollapsed && logsElement.contains(selection.anchorNode));
    }

    async function refresh() {
      const stamp = Date.now();
      let status;
      let logs;
      try {
        status = await fetch(`/api/status?t=${stamp}`, { cache: 'no-store' }).then(r => r.json());
        logs = await fetch(`/api/logs?limit=100&mode=${logMode}&t=${stamp}`, { cache: 'no-store' }).then(r => r.json());
      } catch (err) {
        document.getElementById('last_error').textContent = `刷新失败: ${err.message}`;
        return;
      }
      const runningState = status.running ? (status.paused ? 'paused' : 'running') : 'stopped';
      document.getElementById('running').textContent = label(runningLabels, runningState);
      document.getElementById('start_btn').disabled = status.running;
      document.getElementById('stop_btn').disabled = !status.running;
      document.getElementById('pause_btn').disabled = !status.running || status.paused;
      document.getElementById('resume_btn').disabled = !status.running || !status.paused;
      document.getElementById('energy_btn').disabled = status.running;
      document.getElementById('restart_service_btn').disabled = false;
      document.getElementById('version').textContent = text(status.version);
      const androidUserId = String(status.android_user_id || '0');
      document.getElementById('android_user_id').textContent = androidUserId === '999' ? '分身淘宝 user 999' : '主淘宝 user 0';
      const userSelect = document.getElementById('android_user_select');
      if (document.activeElement !== userSelect) {
        userSelect.value = androidUserId;
      }
      document.getElementById('activity').textContent = text(status.activity);
      document.getElementById('page_type').textContent = label(pageTypeLabels, status.page_type);
      document.getElementById('action').textContent = label(actionLabels, status.action);
      document.getElementById('current_task').textContent = text(status.current_task);
      const excludeTags = Array.isArray(status.exclude_tags) ? status.exclude_tags : [];
      const coinExcludeTags = Array.isArray(status.coin_exclude_tags) ? status.coin_exclude_tags : excludeTags;
      const energyExcludeTags = Array.isArray(status.energy_exclude_tags) ? status.energy_exclude_tags : [];
      document.getElementById('exclude_tags').textContent = [
        `金币: ${coinExcludeTags.length ? coinExcludeTags.join(', ') : '-'}`,
        `体力: ${energyExcludeTags.length ? energyExcludeTags.join(', ') : '-'}`
      ].join('；');
      renderExcludeEditor('coin', coinExcludeTags);
      renderExcludeEditor('energy', energyExcludeTags);
      document.getElementById('last_error').textContent = text(status.last_error);
      document.getElementById('updated_at').textContent = text(status.updated_at);

      const logBox = document.getElementById('logs');
      const logText = logs.logs.join('\n');
      if (isSelectingText() || logText === lastLogText) {
        return;
      }
      lastLogText = logText;
      logBox.replaceChildren(...logs.logs.map(line => {
        const div = document.createElement('div');
        div.className = 'log-line';
        div.textContent = line;
        return div;
      }));
      const distanceToBottom = logBox.scrollHeight - logBox.scrollTop - logBox.clientHeight;
      if (autoScrollLogs) {
        logBox.scrollTop = logBox.scrollHeight;
      }
    }

    refresh();
    loadRules();
    setTimeout(autoStartOnLoad, 500);
    setInterval(refresh, 1000);
  </script>
</body>
</html>
